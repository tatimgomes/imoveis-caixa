name: Buscar detalhes dos imóveis (SP)

on:
  # roda toda segunda-feira às 08:00 UTC (05:00 horário de Brasília)
  # após o workflow de atualização da base (update.yml roda às 06:00 UTC)
  schedule:
    - cron: "0 8 * * 1"
  # permite disparar manualmente
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-detalhes:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium --with-deps

      - name: Buscar detalhes dos imóveis SP
        run: python scripts/fetch_detalhes_sp.py

      - name: Verificar se houve mudança
        id: check_changes
        run: |
          if git diff --quiet -- data/SP_detalhes.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit e push dos detalhes atualizados
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/SP_detalhes.json
          git commit -m "chore: atualiza detalhes dos imóveis SP (automático)"
          git push
