name: Atualizar base de imóveis (Caixa)

on:
  # roda toda segunda-feira às 06:00 UTC (03:00 horário de Brasília)
  schedule:
    - cron: "0 6 * * 1"
  # permite disparar manualmente pela aba Actions do GitHub
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Baixar e processar a lista de imóveis da Caixa
        run: python scripts/update_data.py

      - name: Verificar se houve mudança
        id: check_changes
        run: |
          if git diff --quiet -- data.json data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit e push da base atualizada
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data/
          git commit -m "chore: atualiza base de imóveis (automático)"
          git push
